server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index redesign/index.html;

    # Serve the index at root
    location = / {
        try_files /redesign/index.html =404;
    }

    # Allow large file serving (for MP4)
    client_max_body_size 50M;

    # Cache static assets
    location ~* \.(gif|png|jpg|jpeg|ico|svg|woff|woff2|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Stream MP4 with byte-range support (needed for video scrubbing)
    location ~* \.mp4$ {
        add_header Accept-Ranges bytes;
        expires 1d;
    }

    # Serve everything else normally
    location / {
        try_files $uri $uri/ =404;
    }
}
